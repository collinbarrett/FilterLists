version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "nuget"
    directory: "/services"
    schedule:
      interval: "daily"
    groups:
      aspire:
        patterns:
          - "Aspire.*"
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "daily"